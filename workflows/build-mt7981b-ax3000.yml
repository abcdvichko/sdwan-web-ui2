name: Build GJ-Link AX3000 OpenWrt

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [main]
  schedule:
    # 每周日凌晨4点自动编译
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      branch:
        description: 'OpenWrt Branch'
        required: true
        default: 'openwrt-23.05'
        type: choice
        options:
          - openwrt-23.05
      generate_changelog:
        description: 'Generate changelog'
        required: false
        default: true
        type: boolean

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: ${{ github.event.inputs.branch || 'openwrt-23.05' }}
  # 固定使用 23.05 分支，与配置文件保持一致
  CONFIG_FILE: configs/mt7981b-ax3000.config
  DIY_SCRIPT: scripts/diy.sh
  DTS_FILE: dts/mt7981b-ax3000.dts
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check prerequisites
        run: |
          echo "::group::检查必要文件"
          [ ! -f "${CONFIG_FILE}" ] && { echo "::error::配置文件 ${CONFIG_FILE} 不存在！"; exit 1; }
          [ ! -f "${DIY_SCRIPT}" ] && { echo "::error::DIY 脚本 ${DIY_SCRIPT} 不存在！"; exit 1; }
          [ ! -f "${DTS_FILE}" ] && { echo "::error::设备树文件 ${DTS_FILE} 不存在！"; exit 1; }
          echo "✅ 所有必要文件检查通过"
          echo "   配置文件: ${CONFIG_FILE}"
          echo "   DIY 脚本: ${DIY_SCRIPT}"
          echo "   设备树  : ${DTS_FILE}"
          echo "   分支    : ${REPO_BRANCH}"
          echo "::endgroup::"

      - name: Initialize build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          echo "::group::安装编译依赖"
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y \
            ack antlr3 aria2 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
            gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 \
            libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
            mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip \
            qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl \
            unzip vim wget xmlto xxd zlib1g-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown "$USER:$GROUPS" /workdir
          echo "::endgroup::"

      - name: Clone OpenWrt source
        working-directory: /workdir
        run: |
          echo "::group::克隆 OpenWrt 源码 (${REPO_BRANCH})"
          df -hT "$PWD"
          git clone --depth 1 -b "$REPO_BRANCH" "$REPO_URL" openwrt
          ln -sf /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"
          echo "✅ 源码克隆完成"
          echo "::endgroup::"

      - name: Load custom configuration
        run: |
          echo "::group::加载自定义配置"

          # 1. 复制设备树文件
          echo "[1/5] 复制设备树文件..."
          mkdir -p openwrt/target/linux/mediatek/dts
          cp "$DTS_FILE" openwrt/target/linux/mediatek/dts/

          # 2. 复制配置文件
          echo "[2/5] 复制编译配置..."
          cp "$CONFIG_FILE" openwrt/.config

          # 3. 复制自定义文件
          echo "[3/5] 复制自定义文件..."
          [ -d files ] && cp -r files/* openrt/files/ 2>/dev/null || true

          # 4. 执行 DIY 脚本
          echo "[4/5] 执行 DIY 脚本..."
          chmod +x "$DIY_SCRIPT"
          cd openwrt && env bash "$GITHUB_WORKSPACE/$DIY_SCRIPT"

          # 5. 更新并安装 feeds
          echo "[5/5] 更新 feeds..."
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          echo "::endgroup::"

      - name: Download package sources
        id: package
        run: |
          echo "::group::下载依赖包"
          cd openwrt
          make defconfig
          make download -j$(nproc)

          # 清理下载失败的文件
          find dl -size -1024c -exec ls -l {} \; 2>/dev/null || true
          find dl -size -1024c -exec rm -f {} \; 2>/dev/null || true

          # 输出设备名称
          DEVICE_NAME=$(grep '^CONFIG_TARGET.*DEVICE.*=y' .config 2>/dev/null | sed -r 's/.*DEVICE_(.*)=y/\1/' | head -1)
          [ -n "$DEVICE_NAME" ] && echo "DEVICE_NAME=_${DEVICE_NAME}" >> "$GITHUB_ENV"
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> "$GITHUB_ENV"
          echo "✅ 依赖包下载完成"
          echo "::endgroup::"

      - name: Compile firmware
        id: compile
        run: |
          echo "::group::编译固件"
          cd openwrt
          echo "开始编译，使用 $(nproc) 线程..."
          make -j$(nproc) || {
            echo "::warning::并行编译失败，尝试单线程..."
            make -j1 || {
              echo "::warning::单线程编译失败，尝试详细输出..."
              make -j1 V=s
            }
          }
          echo "status=success" >> "$GITHUB_OUTPUT"
          echo "✅ 固件编译完成"
          echo "::endgroup::"

      - name: Check disk usage
        if: (!cancelled())
        run: |
          echo "::group::磁盘使用情况"
          df -hT
          echo "::endgroup::"

      - name: Organize firmware files
        id: organize
        if: steps.compile.outputs.status == 'success' && !cancelled()
        run: |
          echo "::group::整理固件文件"
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> "$GITHUB_ENV"
          echo "status=success" >> "$GITHUB_OUTPUT"

          # 列出生成的文件
          echo "生成的固件文件:"
          ls -lh *.bin *.itb 2>/dev/null || true
          echo "::endgroup::"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}
          if-no-files-found: warn

      - name: Generate release
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          echo "::group::生成 Release"
          echo "release_tag=$(date +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

          cat > release.txt << EOF
          ## GJ-Link AX3000 OpenWrt 固件

          | 项目 | 详情 |
          |------|------|
          | 设备 | GJ-Link AX3000 (MT7981B) |
          | OpenWrt 分支 | ${REPO_BRANCH} |
          | 编译时间 | $(date +"%Y-%m-%d %H:%M:%S") |
          | 编译服务器 | ubuntu-22.04 |

          ### 默认配置
          - 管理地址: http://192.168.5.1
          - SSH 端口: 5867（仅 LAN 可访问）
          - 默认密码: admin123（首次启动后请修改）
          - WiFi: GJ-Link-2.4G / GJ-Link-5G
          - 软件源: 清华大学镜像站

          ### 安全提示
          ⚠️ **首次登录后请务必修改默认密码**
          ⚠️ SSH 仅允许从 LAN 侧访问，WAN 侧默认关闭
          EOF

          echo "status=success" >> "$GITHUB_OUTPUT"
          echo "✅ Release 信息已生成"
          echo "::endgroup::"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*
